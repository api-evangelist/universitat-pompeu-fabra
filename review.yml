  - date: '2026-06-03'
    rating: 3
    summary: >-
      Verified UPF's public developer footprint with a no-fabrication discipline.
      The DSpace 7.6 repository REST API and the OAI-PMH endpoint both resolved
      live (HTTP 200), with the REST root reporting "DSpace 7.6.8-SNAPSHOT" and
      OAI Identify returning a valid protocol 2.0 response. The "UPF en Xifres
      2.0" open data portal (data.upf.edu) is documented as a CKAN + Virtuoso
      SPARQL platform but did not resolve from the test network (connection
      refused / HTTP 000), likely due to geo or firewall restrictions; it is
      cataloged from official documentation rather than a live probe. SSO is
      handled via adAS / Shibboleth SAML and is gated. No general institutional
      developer portal or API key program was found; research-group code lives on
      GitHub orgs such as MTG and aig-upf rather than as institutional APIs.
    endpoints:
